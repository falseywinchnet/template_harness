name = "scientific_project"
version = "0.1.0"
keywords = ["science", "formal-proof", "reproducibility"]
defaultTargets = ["Formal"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.32.0"

[[lean_lib]]
name = "Formal"
